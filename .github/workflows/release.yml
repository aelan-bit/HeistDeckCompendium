name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Compile packs
        run: |
          npx fvtt package compile --in packs/src/people       --out packs/people
          npx fvtt package compile --in packs/src/treasures    --out packs/treasures
          npx fvtt package compile --in packs/src/obstacles    --out packs/obstacles
          npx fvtt package compile --in packs/src/heist-tables --out packs/heist-tables

      - name: Zip module
        run: zip -r module.zip module.json packs/people packs/treasures packs/obstacles packs/heist-tables

      - name: Upload release assets
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "module.json,module.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
